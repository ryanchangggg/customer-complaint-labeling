# ============================================================
# Customer Complaint Labeling System - Configuration
# ============================================================

# --- DeepSeek API Configuration ---
api:
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 512

# --- Input / Output ---
data:
  input: "data/sample_chat.csv"
  output: "output/results.csv"
  checkpoint: "output/checkpoint.json"
  id_column: "id"
  text_column: "text"

# --- Batch Processing ---
batch:
  size: 20
  rate_limit: 5.0
  min_interval: 0.2

# --- Retry Strategy ---
retry:
  max_attempts: 3
  min_wait: 2
  max_wait: 30

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/labeling.log"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

# ============================================================
# Business Rules
# ============================================================
rules:
  complaint_types:
    - "Course/Teaching Quality"
    - "Investment Advice/Losses"
    - "Platform/App Issues"
    - "Customer Service/Refund"
    - "Learning Effectiveness"
    - "Membership/Renewal"
    - "False Advertising"
    - "Pricing Issues"
    - "Unfair Terms"
    - "Account/Order Issues"

  sentiment_levels:
    0: "Satisfied - User expresses thanks or satisfaction"
    2: "Neutral - General inquiry or normal feedback"
    5: "Slightly Dissatisfied - Mild complaint or discontent"
    8: "Complaint - Significant complaint or anger"
    10: "Extreme Anger - Strong complaint or threatening remarks"
